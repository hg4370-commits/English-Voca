<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 IELTS 오늘의 단어</title>
<style>
  :root {
    --bg:       #f1f5f9;
    --card:     #ffffff;
    --blue-l:   #c6dbf0;
    --blue-m:   #9cbfdf;
    --blue-deep:#6a9fc0;
    --text:     #2d3a45;
    --sub:      #6b7c88;
    --header:   #4a7fa5;
    --accent:   #3a6d8f;
    --radius:   14px;
    --shadow:   0 2px 14px rgba(74,127,165,.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── Header ─── */
  header {
    background: var(--header);
    color: #fff;
    padding: 22px 24px 18px;
    position: sticky; top:0; z-index:100;
  }
  header h1 { font-size:1.25rem; font-weight:700; letter-spacing:-.3px; }
  header .sub { font-size:.8rem; opacity:.82; margin-top:2px; }
  .date-nav {
    display:flex; align-items:center; gap:10px;
    margin-top:14px;
  }
  .date-nav button {
    background: rgba(255,255,255,.22);
    border:none; color:#fff;
    border-radius:8px; padding:6px 14px;
    cursor:pointer; font-size:.9rem;
    transition: background .2s;
  }
  .date-nav button:hover { background:rgba(255,255,255,.38); }
  .date-nav select {
    flex:1; background:rgba(255,255,255,.18);
    border:none; color:#fff;
    border-radius:8px; padding:6px 12px;
    font-size:.9rem; cursor:pointer;
  }
  .date-nav select option { color: var(--text); background:#fff; }

  /* ─── Progress bar ─── */
  .prog-wrap {
    background:rgba(255,255,255,.25);
    border-radius:99px; height:6px;
    margin-top:14px; overflow:hidden;
  }
  .prog-bar {
    height:100%; border-radius:99px;
    background:#c6dbf0; transition: width .4s;
  }
  .prog-label { font-size:.7rem; opacity:.78; margin-top:5px; }

  /* ─── Main ─── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ─── Badge ─── */
  .badge {
    display:inline-flex; align-items:center; gap:5px;
    font-size:.72rem; font-weight:600;
    padding:3px 10px; border-radius:99px;
    margin-bottom:14px;
  }
  .badge.mock-listen { background:#c6dbf0; color:#2d5a78; }
  .badge.mock-read   { background:#daeaf7; color:#2d5a78; }
  .badge.no-mock     { background:#f1f5f9; color:#5a7a8a; border:1px solid #c6dbf0; }

  /* ─── Section cards ─── */
  .section {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow:hidden;
  }
  .section-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 18px;
    cursor:pointer;
    user-select:none;
    transition: background .15s;
  }
  .section-header:hover { background: #f1f5f9; }
  .section-header .left { display:flex; align-items:center; gap:10px; }
  .section-header .icon {
    width:34px; height:34px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem;
  }
  .listen .icon  { background: #c6dbf0; }
  .read .icon    { background: #daeaf7; }
  .task1 .icon   { background: #c6dbf0; }
  .task2 .icon   { background: #daeaf7; }
  .grammar .icon { background: #e8f2fa; }

  .section-header h2 {
    font-size:.95rem; font-weight:600;
  }
  .section-header .meta {
    font-size:.75rem; color: var(--sub);
    margin-top:2px;
  }
  .section-header .count {
    font-size:.8rem; font-weight:600;
    color: var(--accent);
    background: #c6dbf0;
    padding:3px 10px; border-radius:99px;
  }
  .section-header .chevron {
    font-size:.8rem; color:var(--sub);
    transition:transform .25s;
    margin-left:6px;
  }
  .section-header.open .chevron { transform: rotate(180deg); }

  /* ─── Word table ─── */
  .word-list { padding: 0 18px 16px; display:none; }
  .word-list.visible { display:block; }
  .word-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap:7px;
  }
  .word-item {
    background: var(--bg);
    border-radius:9px;
    padding:8px 11px;
    border-left:3px solid var(--blue-m);
  }
  .listen .word-item { border-left-color: #9cbfdf; }
  .read   .word-item { border-left-color: #6a9fc0; }
  .task1  .word-item { border-left-color: #9cbfdf; }
  .task2  .word-item { border-left-color: #6a9fc0; }

  .word-en {
    font-size:.85rem; font-weight:600;
    color: var(--accent);
    line-height:1.3;
  }
  .word-ko {
    font-size:.75rem; color: var(--sub);
    margin-top:2px;
  }

  /* ─── Grammar card ─── */
  .grammar-body {
    padding:12px 18px 16px;
    font-size:.9rem; color: var(--sub);
    display:none;
  }
  .grammar-body.visible { display:block; }

  /* ─── Today tasks summary ─── */
  .summary-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:10px; margin-bottom:14px;
  }
  .summary-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding:14px 16px;
    text-align:center;
  }
  .summary-card .num { font-size:1.6rem; font-weight:700; color:var(--accent); }
  .summary-card .lbl { font-size:.73rem; color:var(--sub); margin-top:3px; }

  /* ─── Essay reminder ─── */
  .essay-card {
    background: #daeaf7;
    border-radius: var(--radius);
    padding:14px 18px;
    margin-bottom:14px;
    font-size:.88rem;
    color: var(--text);
    border-left: 4px solid var(--blue-deep);
  }
  .essay-card ul { margin-top:8px; padding-left:18px; }
  .essay-card li { margin-bottom:4px; }

  /* ─── No schedule ─── */
  .no-schedule {
    text-align:center; padding:60px 20px;
    color: var(--sub);
  }
  .no-schedule .emoji { font-size:3rem; }

  /* ─── check mark ─── */
  .check-row {
    display:flex; align-items:center; gap:8px;
    padding:10px 18px;
    border-top:1px solid #e4eef7;
    font-size:.85rem;
  }
  .check-btn {
    width:22px; height:22px;
    border:2px solid #9cbfdf;
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition: background .15s;
    color:transparent;
    font-size:.75rem;
  }
  .check-btn.done {
    background: var(--header); border-color: var(--header);
    color:#fff;
  }

  .topic-badge {
    font-size:.73rem;
    background: #c6dbf0;
    color:#2d5a78;
    padding:2px 9px; border-radius:99px;
    margin-left:6px;
  }
</style>

// ── utils ──
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let currentIdx = 0;

function findTodayIdx() {
  const t = todayISO();
  const idx = SCHEDULE.findIndex(s => s.date === t);
  return idx >= 0 ? idx : 0;
}

// ── 날짜 select 초기화 ──
function buildSelect() {
  const sel = document.getElementById('date-select');
  SCHEDULE.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.label + (s.date === todayISO() ? ' ← 오늘' : '');
    sel.appendChild(opt);
  });
}

function changeDay(delta) {
  const next = currentIdx + delta;
  if (next >= 0 && next < SCHEDULE.length) {
    currentIdx = next;
    render();
  }
}

function selectDay(val) {
  currentIdx = parseInt(val);
  render();
}

// ── check state (localStorage) ──
function getChecks(dateStr) {
  try { return JSON.parse(localStorage.getItem('ck_'+dateStr)||'{}'); }
  catch { return {}; }
}
function saveCheck(dateStr, key, val) {
  const c = getChecks(dateStr);
  c[key] = val;
  localStorage.setItem('ck_'+dateStr, JSON.stringify(c));
}

// ── render ──
function render() {
  const s = SCHEDULE[currentIdx];
  document.getElementById('date-select').value = currentIdx;

  // progress bar
  const pct = Math.round((currentIdx+1)/SCHEDULE.length*100);
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `Day ${s.day_num} / 24 (${pct}% 완료)`;

  const checks = getChecks(s.date);
  const app = document.getElementById('app');

  // ── mock badge ──
  let mockBadge = '';
  if (s.mock === '리스닝 모의고사') {
    mockBadge = `<span class="badge mock-listen">🎧 ${s.mock} 일정</span>`;
  } else if (s.mock === '리딩 모의고사') {
    mockBadge = `<span class="badge mock-read">📖 ${s.mock} 일정</span>`;
  } else {
    mockBadge = `<span class="badge no-mock">✏️ 모의고사 없음 · 단어+에세이 집중</span>`;
  }

  // ── summary grid ──
  const totalWords = s.listening.words.length + s.reading.words.length + s.task1.words.length + s.task2.words.length;

  // ── word cards ──
  function wordGrid(words, sectionClass) {
    return `<div class="word-grid">${
      words.map(w => `<div class="word-item ${sectionClass}">
        <div class="word-en">${w.en}</div>
        ${w.ko ? `<div class="word-ko">${w.ko}</div>` : ''}
      </div>`).join('')
    }</div>`;
  }

  function sectionCard(id, icon, title, meta, count, colorClass, bodyHTML) {
    const isOpen = checks['open_'+id] || false;
    const isDone = checks['done_'+id] || false;
    return `
    <div class="section ${colorClass}">
      <div class="section-header ${isOpen?'open':''} " onclick="toggleSection('${s.date}','${id}')">
        <div class="left">
          <div class="icon">${icon}</div>
          <div>
            <h2>${title}</h2>
            <div class="meta">${meta}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="count">${count}개</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="word-list ${isOpen?'visible':''}" id="body_${id}">${bodyHTML}</div>
      <div class="check-row">
        <div class="check-btn ${isDone?'done':''}" onclick="toggleDone('${s.date}','${id}',this)">✓</div>
        <span style="font-size:.8rem;color:#6b7c88">완료 체크</span>
      </div>
    </div>`;
  }

  app.innerHTML = `
    ${mockBadge}

    <div class="summary-grid">
      <div class="summary-card"><div class="num">${totalWords}</div><div class="lbl">오늘 총 단어</div></div>
      <div class="summary-card"><div class="num">Day ${s.day_num}</div><div class="lbl">24일 중</div></div>
    </div>

    ${sectionCard('listen','🎧',
      '리스닝 단어',
      s.listening.source,
      s.listening.words.length,
      'listen',
      wordGrid(s.listening.words,'listen')
    )}

    ${sectionCard('read','📖',
      '리딩 단어',
      s.reading.source,
      s.reading.words.length,
      'read',
      wordGrid(s.reading.words,'read')
    )}

    ${sectionCard('task1','✍️',
      'Task 1 단어',
      '라이팅 Task 1 어휘',
      s.task1.words.length,
      'task1',
      wordGrid(s.task1.words,'task1')
    )}

    ${sectionCard('task2','💬',
      'Task 2 단어',
      s.task2.topic,
      s.task2.words.length,
      'task2',
      wordGrid(s.task2.words,'task2')
    )}

    <div class="section grammar">
      <div class="section-header ${checks['open_gram']?'open':''}" onclick="toggleSection('${s.date}','gram')">
        <div class="left">
          <div class="icon">📘</div>
          <div><h2>${s.grammar}</h2><div class="meta">문법 교재</div></div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="grammar-body ${checks['open_gram']?'visible':''}" id="body_gram">
        오늘의 문법 단원을 학습하세요. 예문을 소리 내어 읽고, 핵심 패턴을 3번 써 보세요.
      </div>
      <div class="check-row">
        <div class="check-btn ${checks['done_gram']?'done':''}" onclick="toggleDone('${s.date}','gram',this)">✓</div>
        <span style="font-size:.8rem;color:#6b7c88">완료 체크</span>
      </div>
    </div>

    <div class="essay-card">
      ✏️ <strong>오늘의 에세이 + 오답노트</strong>
      <ul>
        <li>Task 1 에세이 1편 작성</li>
        <li>Task 2 에세이 1편 작성</li>
        <li>오답노트 → 문법 / 어휘 / 구조 3개 카테고리 정리</li>
      </ul>
    </div>
  `;
}

function toggleSection(dateStr, id) {
  const body = document.getElementById('body_'+id);
  const header = body.previousElementSibling;
  const isOpen = body.classList.contains('visible');
  if(isOpen) {
    body.classList.remove('visible'); header.classList.remove('open');
  } else {
    body.classList.add('visible'); header.classList.add('open');
  }
  saveCheck(dateStr, 'open_'+id, !isOpen);
}

function toggleDone(dateStr, id, btn) {
  const now = !btn.classList.contains('done');
  btn.classList.toggle('done');
  saveCheck(dateStr, 'done_'+id, now);
}

// ── init ──
buildSelect();
currentIdx = findTodayIdx();
render();
</script>
